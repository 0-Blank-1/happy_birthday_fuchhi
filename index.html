<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
/* =========================================
   1. CSS VARIABLES & BASE STYLING
   ========================================= */
:root {
  --primary: #ffafbd;
  --secondary: #ffc3a0;
  --accent: #ff6b81;
  --text-dark: #4a4a4a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  user-select: none; /* Prevents text highlighting while clicking fast */
}

body {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  color: var(--text-dark);
  position: relative;
}

/* =========================================
   2. SCREEN SYSTEM
   ========================================= */
.screen {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 10;
}

.screen.active {
  opacity: 1;
  pointer-events: auto;
}

/* =========================================
   3. UI COMPONENTS (CARDS, BUTTONS)
   ========================================= */
.card {
  background: rgba(255, 255, 255, 0.95);
  padding: 40px 30px;
  border-radius: 20px;
  max-width: 500px;
  width: 90%;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
  transform: translateY(20px);
  animation: floatUp 0.6s forwards ease-out;
}

button {
  padding: 15px 30px;
  border: none;
  border-radius: 25px;
  background: var(--accent);
  color: white;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
  box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(255, 107, 129, 0.6);
}
button:active { transform: translateY(1px); }

/* Landing Page Monkey */
.monkey {
  font-size: 100px;
  cursor: pointer;
  animation: bounce 2s infinite ease-in-out;
  margin: 20px 0;
  filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.2));
}

@keyframes bounce { 
  0%, 100% { transform: translateY(0); } 
  50% { transform: translateY(-20px); } 
}
@keyframes floatUp { to { transform: translateY(0); } }

/* =========================================
   4. BACKGROUND ANIMATIONS
   ========================================= */
.bg-item {
  position: absolute;
  font-size: 30px;
  opacity: 0.6;
  z-index: 1;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(105vh) rotate(0deg); }
  100% { transform: translateY(-10vh) rotate(360deg); }
}

/* =========================================
   5. MINI GAME & ENVELOPE
   ========================================= */
.cake {
  position: absolute;
  font-size: 45px;
  cursor: pointer;
  z-index: 100;
  transition: transform 0.1s;
}
.cake:active { transform: scale(0.8); }

#count {
  font-size: 1.5rem;
  font-weight: bold;
  background: white;
  padding: 10px 20px;
  border-radius: 20px;
  margin-top: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Envelope/Wish */
#envelope {
  position: relative;
  width: 100%;
  height: 150px;
  margin: 20px auto;
  background: #fdfdfd;
  border: 2px solid #ff6b81;
  border-radius: 10px;
  overflow: hidden;
  transition: all 0.8s ease;
}

#envelope textarea {
  width: 100%;
  height: 100%;
  border: none;
  resize: none;
  padding: 15px;
  font-size: 1.1rem;
  outline: none;
  text-align: center;
}

.flap {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: #ff6b81;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 0.6s;
  pointer-events: none;
  transform: rotateX(180deg); /* Open by default */
}

.fold {
  transform: scale(0.2) rotate(360deg);
  border-radius: 50% !important;
  background: #ff6b81 !important;
  opacity: 0;
}

/* =========================================
   6. PLINKO & SECRETS
   ========================================= */
canvas {
  background: rgba(255, 255, 255, 0.6);
  border-radius: 15px;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
}

#secretModal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-box {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.modal-box input {
  padding: 10px;
  margin: 15px 0;
  border-radius: 8px;
  border: 2px solid var(--accent);
  width: 80%;
  font-size: 1.1rem;
  text-align: center;
}

.spark {
  position: absolute;
  width: 8px; height: 8px;
  background: gold;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
  z-index: 1000;
}

@keyframes explode {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
}
</style>
</head>

<body>

<div id="bg-container"></div>

<div class="screen active" id="landing">
  <h1 style="color: white; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">Happy Birthdayy!! 🎉</h1>
  <div class="monkey" onclick="go('card')">🐒</div>
  <p style="background: white; padding: 5px 15px; border-radius: 10px; font-weight: bold;">Click the Monkey!</p>
</div>

<div class="screen" id="card">
  <div class="card">
    <h2 style="color: #ff6b81; font-size: 2rem; margin-bottom: 15px;">To My Elder Sister 👑</h2>
    <p style="font-size: 1.2rem; line-height: 1.6;">
      Happy Birthday 😏<br><br>
      You’re officially getting older… like seriously 👵😂<br>
      Grandma update incoming soon.<br><br>
      But still… my favorite annoying human 💖
    </p>
    <button onclick="startGame()">Mini Game 🎁</button>
    <br>
    <button onclick="openSecret()" style="background: #ccc; color: #333; margin-top: 10px; padding: 10px 20px; font-size: 0.9rem;">🔐 Secret Code</button>
  </div>
</div>

<div class="screen" id="game">
  <h2 style="color: white; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">Catch 3 Cakes 🎂</h2>
  <div id="count">0 / 3</div>
</div>

<div class="screen" id="wish">
  <div class="card">
    <h2 style="color: #ff6b81; margin-bottom: 10px;">Make a Wish ✨</h2>
    <div id="envelope">
      <textarea id="wishInput" placeholder="Write your birthday wish..."></textarea>
      <div class="flap"></div>
    </div>
    <button onclick="dropWish()">Seal & Drop 🎯</button>
  </div>
</div>

<div class="screen" id="plinko">
  <h2 style="color: white; margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Grandma's Fate 🎲</h2>
  <canvas id="board" width="340" height="450"></canvas>
</div>

<div class="screen" id="result">
  <div class="card">
    <h2 id="resultTitle" style="color: #ff6b81; font-size: 2rem; margin-bottom: 10px;"></h2>
    <p id="resultText" style="font-size: 1.3rem;"></p>
    <button onclick="location.reload()">Play Again 🔄</button>
  </div>
</div>

<div id="secretModal">
  <div class="modal-box">
    <h3 style="color: #ff6b81;">Enter Code</h3>
    <input type="text" id="secretInput" placeholder="Password...">
    <br>
    <button onclick="checkSecret()">Unlock</button>
    <button onclick="closeSecret()" style="background: #ccc;">Cancel</button>
  </div>
</div>

<script>
/* =========================================
   SCREEN NAVIGATION
   ========================================= */
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =========================================
   BACKGROUND GENERATOR (Balloons & Confetti)
   ========================================= */
function createBackground() {
  const container = document.getElementById("bg-container");
  const items = ["🎈", "✨", "🎉", "🎊", "🎂"];
  
  for(let i = 0; i < 25; i++) {
    let b = document.createElement("div");
    b.className = "bg-item";
    b.innerText = items[Math.floor(Math.random() * items.length)];
    b.style.left = Math.random() * 100 + "vw";
    // Randomize speed and delay
    b.style.animationDuration = (8 + Math.random() * 10) + "s";
    b.style.animationDelay = (Math.random() * 5) + "s";
    // Randomize size slightly
    b.style.fontSize = (20 + Math.random() * 20) + "px";
    container.appendChild(b);
  }
}
createBackground();

/* =========================================
   MINI GAME LOGIC
   ========================================= */
let cakesCaught = 0;
let gameSpawner;

function startGame() {
  go("game");
  cakesCaught = 0;
  document.getElementById("count").innerText = "0 / 3";

  // Spawn a cake every 800ms
  gameSpawner = setInterval(() => {
    if(cakesCaught >= 3) {
      clearInterval(gameSpawner);
      setTimeout(() => go("wish"), 600);
      return;
    }

    let cake = document.createElement("div");
    cake.className = "cake";
    cake.innerText = "🎂";
    cake.style.left = (Math.random() * 80 + 10) + "%"; // Keep within screen bounds
    cake.style.top = "-50px";
    document.getElementById("game").appendChild(cake);

    let pos = -50;
    // Fall animation loop
    let fallInterval = setInterval(() => {
      pos += 4; // Fall speed
      cake.style.top = pos + "px";
      
      // Remove if it falls off screen
      if(pos > window.innerHeight) {
        cake.remove();
        clearInterval(fallInterval);
      }
    }, 20);

    // Click event to catch cake
    cake.onclick = () => {
      cake.remove();
      clearInterval(fallInterval);
      cakesCaught++;
      document.getElementById("count").innerText = cakesCaught + " / 3";
    };

  }, 800);
}

/* =========================================
   WISH TO PLINKO TRANSITION
   ========================================= */
let userWishText = "";

function dropWish() {
  userWishText = document.getElementById("wishInput").value.trim();
  if(!userWishText) {
    alert("You have to write a wish first! 🙄");
    return;
  }

  let env = document.getElementById("envelope");
  let flap = document.querySelector(".flap");

  // 1. Close the envelope flap
  flap.style.transform = "rotateX(0deg)";

  // 2. Turn envelope into a ball
  setTimeout(() => {
    env.classList.add("fold");
  }, 600);

  // 3. Go to Plinko
  setTimeout(() => {
    go("plinko");
    startPlinko();
  }, 1400);
}

/* =========================================
   PLINKO PHYSICS ENGINE
   ========================================= */
function startPlinko() {
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  
  let pegs = [];
  let w = canvas.width;
  let h = canvas.height;
  
  // Create triangle peg pattern
  const rows = 9;
  const cols = 8;
  const spacingX = w / cols;
  const spacingY = (h - 60) / rows;

  for(let row = 0; row < rows; row++) {
    let y = (row + 1) * spacingY + 20;
    let isEven = row % 2 === 0;
    let maxCols = isEven ? cols : cols - 1;
    let offsetX = isEven ? spacingX/2 : spacingX;

    for(let col = 0; col < maxCols; col++) {
      pegs.push({ x: offsetX + col * spacingX, y: y, r: 4 });
    }
  }

  // Initial Ball State
  let ball = { 
    x: w / 2 + (Math.random() * 10 - 5), // Drop slightly off-center
    y: 10, 
    vx: 0, 
    vy: 0, 
    r: 8 
  };

  function drawFrame() {
    ctx.clearRect(0, 0, w, h);

    // Draw Pegs
    ctx.fillStyle = "#666";
    pegs.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw Bottom Zones (7 slots)
    ctx.fillStyle = "rgba(255, 107, 129, 0.2)";
    for(let i = 0; i < 7; i++) {
      ctx.fillRect(i * (w/7), h - 30, w/7 - 2, 30);
      if(i === 3) ctx.fillStyle = "rgba(255, 215, 0, 0.4)"; // Highlight center
    }

    // Draw Ball
    ctx.fillStyle = "#ff6b81";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();

    // Physics
    ball.vy += 0.25; // Gravity
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall bounces
    if(ball.x - ball.r < 0 || ball.x + ball.r > w) ball.vx *= -1;

    // Peg Collisions
    pegs.forEach(p => {
      let dx = ball.x - p.x;
      let dy = ball.y - p.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < ball.r + p.r) {
        ball.vy *= -0.5; // Dampen bounce
        ball.vx += (dx / dist) * 2; // Deflect
        ball.y = p.y - ball.r - p.r; // Push out to prevent sticking
      }
    });

    // Check if ball reached the bottom buckets
    if(ball.y > h - 30) {
      let slotWidth = w / 7;
      let slot = Math.floor(ball.x / slotWidth);
      slot = Math.max(0, Math.min(6, slot)); // Ensure it's between 0-6
      triggerOutcome(slot);
      return; // Stop the animation loop
    }

    requestAnimationFrame(drawFrame);
  }

  drawFrame(); // Start loop
}

/* =========================================
   OUTCOME & FIREWORKS
   ========================================= */
function triggerOutcome(slot) {
  go("result");

  const msgs = [
    "Wish denied… try again, elder one 😌",      // Slot 0
    "Almost there… just like your youth 😏",       // Slot 1
    "Grandma luck activated 👵😂",                 // Slot 2
    "JACKPOT",                                     // Slot 3 (Center)
    "Still love you though 💖",                    // Slot 4
    "Your joints are creaky, but wish is safe",    // Slot 5
    "Maybe next year, oldie 🎂"                    // Slot 6
  ];

  if(slot === 3) {
    document.getElementById("resultTitle").innerText = "🎆 JACKPOT 🎆";
    document.getElementById("resultText").innerText = `Oho, "${userWishText}" will be fulfilled ✨`;
    fireworks();
  } else {
    document.getElementById("resultTitle").innerText = "Let's see...";
    document.getElementById("resultText").innerText = msgs[slot];
  }
}

function fireworks() {
  for(let i = 0; i < 60; i++) {
    let spark = document.createElement("div");
    spark.className = "spark";
    spark.style.left = "50%";
    spark.style.top = "50%";
    
    // Randomize explosion direction
    let xTarget = (Math.random() * 300 - 150) + "px";
    let yTarget = (Math.random() * 300 - 150) + "px";
    
    // Assign CSS variables for the keyframe animation
    spark.style.setProperty("--x", xTarget);
    spark.style.setProperty("--y", yTarget);
    
    // Randomize colors
    let colors = ['#ff6b81', '#ffc3a0', 'gold', 'white'];
    spark.style.background = colors[Math.floor(Math.random() * colors.length)];
    
    document.body.appendChild(spark);
    
    // Clean up DOM after animation
    setTimeout(() => spark.remove(), 1000);
  }
}

/* =========================================
   SECRET MODAL LOGIC
   ========================================= */
function openSecret() { document.getElementById("secretModal").style.display = "flex"; }
function closeSecret() { 
  document.getElementById("secretModal").style.display = "none"; 
  document.getElementById("secretInput").value = "";
}

function checkSecret() {
  let val = document.getElementById("secretInput").value.toLowerCase().trim();

  let secrets = {
    "grandma": "Secret Unlocked: You may be older, but you're still the best sister. 💖",
    "fuchhi": "Haha caught you! Happy Birthday! 😂🎉"
  };

  if(secrets[val]) {
    alert("✨ UNLOCKED ✨\n\n" + secrets[val]);
    closeSecret();
  } else {
    alert("Incorrect! Memory fading already? 👵");
  }
}
</script>
</body>
</html>
