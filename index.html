<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/path/to/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
/* GENERAL */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow-x: hidden;
  background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
  text-align: center;
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 40px;
  height: 50px;
  background: pink;
  border-radius: 50%;
  animation: floatUp 10s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-100vh); }
}

/* LANDING */
#landing {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#monkey {
  font-size: 80px;
  cursor: pointer;
}

.hidden {
  display: none;
}

/* CARD */
#card {
  padding: 20px;
}

.card-box {
  background: white;
  padding: 20px;
  margin: auto;
  border-radius: 20px;
  max-width: 90%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff7aa2;
  color: white;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
}

/* CAKES */
.cake {
  position: absolute;
  font-size: 30px;
  cursor: pointer;
}

/* INPUT */
input {
  padding: 10px;
  width: 70%;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* PLINKO */
#plinko {
  margin-top: 30px;
}

.holes {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
}

.hole {
  width: 40px;
  height: 20px;
  background: #444;
  border-radius: 5px;
}

/* FIREWORK */
.firework {
  position: fixed;
  top: 50%;
  left: 50%;
  font-size: 40px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <h1>Happy Birthdayy!! 🎉</h1>
  <div id="monkey">🐵<br><small>Click Me</small></div>
</div>

<!-- CARD -->
<div id="card" class="hidden">
  <div class="card-box">
    <h2>To My Amazing Sister 💖</h2>
    <p>
      Happy Birthday! You’re getting older... like seriously older 😏👵  
      But don’t worry, you’ll always be my favorite annoying human 💖  
      Grandma vibes incoming but still loved ✨
    </p>
    <button onclick="startGame()">Click for Mini Game 🎁</button>
  </div>
</div>

<!-- GAME AREA -->
<div id="game"></div>

<!-- AUDIO -->
<audio id="bgMusic" controls>
  <!-- add your music here -->
</audio>

<script>
/* TRANSITION */
document.getElementById("monkey").onclick = () => {
  document.getElementById("landing").classList.add("hidden");
  document.getElementById("card").classList.remove("hidden");
};

/* MINI GAME */
function startGame() {
  let game = document.getElementById("game");
  game.innerHTML = "<h2>Click 3 falling cakes 🎂</h2>";
  
  let count = 0;

  for (let i = 0; i < 10; i++) {
    let cake = document.createElement("div");
    cake.className = "cake";
    cake.innerHTML = "🎂";
    cake.style.left = Math.random() * 90 + "%";
    cake.style.top = "-50px";

    document.body.appendChild(cake);

    let fall = setInterval(() => {
      cake.style.top = (cake.offsetTop + 3) + "px";
      if (cake.offsetTop > window.innerHeight) {
        cake.remove();
        clearInterval(fall);
      }
    }, 20);

    cake.onclick = () => {
      cake.remove();
      count++;
      if (count === 3) {
        game.innerHTML = "";
        showWishInput();
      }
    };
  }
}

/* WISH INPUT */
function showWishInput() {
  let game = document.getElementById("game");
  game.innerHTML = `
    <h2>Write your wish ✨</h2>
    <input id="wish" placeholder="Write your wish...">
    <br>
    <button onclick="dropBall()">Submit</button>
  `;
}

/* PLINKO */
function dropBall() {
  let wish = document.getElementById("wish").value;

  let result = Math.floor(Math.random() * 7);

  let messages = [
    "Grandma luck activated 👵😂",
    "Almost there… just like your youth 😏",
    "Try again elder one 😌",
    "Not today 😂",
    "Still love you though 💖",
    "Close enough 😏",
  ];

  if (result === 3) {
    showFirework(`Oho, your wish of "${wish}" will be fulfilled ✨`);
  } else {
    alert(messages[result > 3 ? result - 1 : result]);
  }
}

/* FIREWORK */
function showFirework(msg) {
  let fw = document.createElement("div");
  fw.className = "firework";
  fw.innerHTML = "🎆";
  document.body.appendChild(fw);

  setTimeout(() => {
    alert(msg);
    fw.remove();
  }, 1000);
}
</script>

</body>
</html>
